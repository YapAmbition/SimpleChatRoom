<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Simple Chat</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="overlay" class="overlay">
        <div id="loginBox" class="login-modal">
          <h2>登录 Chat</h2>
          <div style="display:flex; align-items:center; gap:12px;">
            <div id="loginAvatar" class="avatar login-avatar" style="width:48px;height:48px;font-size:20px;"></div>
            <input id="username" class="join-input" placeholder="输入用户名（支持emoji）" autocomplete="off" style="flex:1;" />
            <button id="randomNameBtn" class="random-name-btn" title="随机生成名字">随机</button>
          </div>
          <div style="margin-top:12px; text-align:right;"><button id="loginBtn" class="login-btn">进入聊天室</button></div>
        </div>
      </div>

      <div id="chatBox" class="hidden chat-dimmed">
        <div class="header">
          <div class="header-left">
            <div id="roomTitle" class="room-title">主房间</div>
            <div id="roomSubtitle" class="room-sub">在线人数：<span id="roomCount">0</span></div>
          </div>
          <div class="header-right">
            <div class="user-chip">
              <div id="headerAvatar" class="avatar header-avatar"></div>
              <div id="me" class="username">未登录</div>
              <label class="notify-label"><input type="checkbox" id="notifyToggle" />通知</label>
            </div>
            <!-- rooms toggle visible on small screens -->
            <button id="roomsToggle" class="rooms-toggle" aria-label="Toggle rooms">☰</button>
            <div class="room-join">
              <input id="roomInput" class="join-input" placeholder="聊天室名" />
              <button id="joinRoomBtn" class="join-btn">加入</button>
            </div>
          </div>
        </div>
        <div class="layout">
          <div id="messages" class="messages"></div>
          <div id="sidebar" class="sidebar">
            <h4>房间列表</h4>
            <ul id="rooms"></ul>
            <hr />
            <h4>在线用户</h4>
            <ul id="users"></ul>
          </div>
        </div>
        <div class="composer">
          <div id="pastePreview" class="paste-preview" style="display:none;">
            <img id="pasteImg" />
            <button id="pasteRemove" class="paste-remove" title="移除图片">&times;</button>
          </div>
          <div class="right-controls">
            <textarea id="msgInput" placeholder="输入消息，按 Enter 发送；Mac: ⌘+Enter 换行，Windows: Ctrl+Enter 换行"></textarea>
            <input type="file" id="fileInput" style="display:none" />
            <button id="fileBtn" class="file-btn" title="发送文件">&#128206;</button>
            <button id="sendBtn" class="send-btn">发送</button>
          </div>
        </div>
      </div>
      <!-- Password modal for join/create room -->
      <div id="pwModal" class="overlay" style="display:none;">
        <div class="login-modal" id="pwBox">
          <h3 id="pwTitle">房间密码</h3>
          <input id="pwInput" placeholder="输入房间密码（留空表示无密码）" />
          <div style="margin-top:12px; text-align:right;">
            <button id="pwCancel" class="btn-secondary">取消</button>
            <button id="pwConfirm" class="btn-primary">确定</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="app.js"></script>
  </body>
  </html>
