<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Simple Chat</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="overlay" class="overlay">
        <div id="loginBox" class="login-modal">
          <h2>登录 Chat</h2>
          <div style="display:flex; align-items:center; gap:12px;">
            <div id="loginAvatar" class="avatar login-avatar" style="width:48px;height:48px;font-size:20px;"></div>
            <input id="username" class="join-input" placeholder="输入用户名（支持emoji）" />
          </div>
          <div style="margin-top:12px; text-align:right;"><button id="loginBtn">进入聊天室</button></div>
        </div>
      </div>

      <div id="chatBox" class="hidden chat-dimmed">
        <div class="header">
          <div class="header-left">
            <div id="roomTitle" class="room-title">主房间</div>
            <div id="roomSubtitle" class="room-sub">在线人数：<span id="roomCount">0</span></div>
          </div>
          <div class="header-right">
            <div class="user-chip">
              <div id="headerAvatar" class="avatar header-avatar"></div>
              <div id="me" class="username">未登录</div>
            </div>
            <div class="room-join">
              <input id="roomInput" class="join-input" placeholder="聊天室名" />
              <button id="joinRoomBtn" class="join-btn">加入</button>
            </div>
          </div>
        </div>
        <div class="layout">
          <div id="messages" class="messages"></div>
          <div id="sidebar" class="sidebar">
            <h4>房间列表</h4>
            <ul id="rooms"></ul>
            <hr />
            <h4>在线用户</h4>
            <ul id="users"></ul>
          </div>
        </div>
        <div class="composer">
          <div class="right-controls">
            <input id="msgInput" placeholder="输入消息，回车发送" />
            <button id="sendBtn">发送</button>
          </div>
        </div>
      </div>
      <!-- Password modal for join/create room -->
      <div id="pwModal" class="overlay" style="display:none;">
        <div class="login-modal" id="pwBox">
          <h3 id="pwTitle">房间密码</h3>
          <input id="pwInput" placeholder="输入房间密码（留空表示无密码）" />
          <div style="margin-top:12px; text-align:right;">
            <button id="pwCancel">取消</button>
            <button id="pwConfirm">确定</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="app.js"></script>
  </body>
  </html>
